<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<link rel="stylesheet" href="/css/styles.css">
<script src="/js/admin.js" defer></script>

<style>
/* Center login page */
.login-wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:80vh;
}

/* Login card */
.login-card{
  width:420px;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius:14px;
  padding:30px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.login-card h1{
  text-align:center;
  margin-bottom:25px;
}

.login-card label{
  display:block;
  margin-top:12px;
  margin-bottom:6px;
}

.login-card input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:white;
}

.login-card button{
  width:100%;
  margin-top:18px;
}
</style>

</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-inner">
    <div class="brand">QIU Lost & Found <span class="badge">Admin</span></div>

    <div class="nav-links">
      <a class="btn" href="/index.html">Home</a>
      <a class="btn" href="/lost.html">View Lost</a>
      <a class="btn" href="/found.html">View Found</a>
    </div>
  </div>
</div>


<div class="login-wrapper">

<div class="login-card">

<h1>Admin Login</h1>

<form id="loginForm">

<label>Username</label>
<input type="text" id="username" required>

<label>Password</label>
<input type="password" id="password" required>

<button class="btn primary" type="submit">Login</button>

<p id="loginMsg" style="margin-top:10px;"></p>

</form>

</div>

</div>

</body>
</html>
