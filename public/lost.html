<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lost Items - QIU Lost & Found</title>

  <link rel="stylesheet" href="/css/styles.css" />
  <script src="/js/list.js" defer></script>
</head>

<body data-category="lost">
  <div class="nav">
    <div class="nav-inner">
      <div class="brand">QIU Lost & Found <span class="badge">Lost</span></div>
      <div class="nav-links">
        <a class="btn" href="/index.html">Home</a>
        <a class="btn" href="/report.html">Report Item</a>
        <a class="btn" href="/found.html">Found Items</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="hero">
      <h1 class="h-title">Lost Items</h1>
      <p class="h-sub">Browse latest lost item reports.</p>

      <div class="kpi">
        <span class="pill warn">Category: LOST</span>
        <span class="pill" id="countPill">Loading…</span>
      </div>
    </div>

    <div class="grid">
      <div class="card full">
        <div class="row">
          <div>
            <label>Search (title / location / contact)</label>
            <input id="searchInput" placeholder="e.g., wallet, library, 012..." />
          </div>
          <div>
            <label>Status</label>
            <select id="statusFilter">
              <option value="all">All</option>
              <option value="Active">Active</option>
              <option value="Claimed">Claimed</option>
              <option value="Resolved">Resolved</option>
            </select>
          </div>
        </div>

        <div style="margin-top:12px" class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Type</th>
                <th>Item</th>
                <th>Location</th>
                <th>Date</th>
                <th>Contact</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="itemsTableBody">
              <tr><td colspan="7">Loading…</td></tr>
            </tbody>
          </table>
        </div>

        <small id="msg" style="display:block; margin-top:10px"></small>
      </div>
    </div>
  </div>
</body>
</html>
